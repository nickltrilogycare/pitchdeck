<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <style>
      .ff-o { fill: #E8662A; }
    </style>
  </defs>
  <!-- Person with telescope icon -->
  <g transform="translate(160, 0)">
    <!-- Head -->
    <circle class="ff-o" cx="0" cy="16" r="13"/>
    <!-- Body torso -->
    <path class="ff-o" d="M-16,32 C-16,32 -8,28 0,28 C8,28 16,32 16,32 L12,72 C12,72 6,76 0,76 C-6,76 -12,72 -12,72 Z"/>
    <!-- Left arm extended holding telescope -->
    <path class="ff-o" d="M-14,38 L-8,36 L18,18 L22,14 L18,12 L-10,32 L-16,34 Z"/>
    <!-- Telescope barrel -->
    <rect class="ff-o" x="14" y="8" width="32" height="9" rx="2" transform="rotate(-22, 30, 12)"/>
    <!-- Telescope eyepiece -->
    <rect class="ff-o" x="44" y="2" width="14" height="16" rx="2" transform="rotate(-22, 51, 10)"/>
    <!-- Right arm -->
    <path class="ff-o" d="M14,42 L18,40 L8,60 L4,58 Z"/>
  </g>
  <!-- FUTURE FOCUS text -->
  <text x="160" y="112" text-anchor="middle" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="30" fill="#FFFFFF" letter-spacing="2">FUTURE FOCUS</text>
  <!-- SUPPORT COORDINATION subtext -->
  <text x="160" y="134" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="12" fill="#FFFFFF" letter-spacing="4" opacity="0.7">SUPPORT COORDINATION</text>
</svg>
